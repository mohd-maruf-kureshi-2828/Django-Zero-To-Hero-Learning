{%extends 'layout.html'%}
{% block title %}
  My App Home
{% endblock %}

{% block content %}
  <h1>Welcome to My App!</h1>
  <p>This is the home page of my Django application.</p>
  
  {% for chai in chais %}
     <div style="border:1px solid black; padding:10px; margin:10px;">
      <img style='height:120px; ' src="{{ chai.image.url }}" alt="{{ chai.name }}" />
      <h2>{{ chai.name }}</h2>
      <a href="{% url 'Chai_Descrition' chai.id %}">
        <button
          type="button">
          {{ chai.type}} -{{chai.id}}
        </button>
      </a>
      </div>
    
  {% endfor %}   
{% endblock %}
